$kind: http-request
name: Forgot Password
method: POST
url: '{{baseUrl}}/api/auth/forgot-password'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "expectedRole": "student",
      "clientOrigin": "http://localhost:3000"
    }
description: >
  Sends a password reset email to the provided address.
  `expectedRole` is optional (student/instructor/admin).
  `clientOrigin` is optional — the frontend URL used to build the reset link.
